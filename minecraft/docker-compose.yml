version: '3.8'

x-traefik-enable-labels: &traefik-labels
  traefik.enable: "true"
  traefik.swarm.network: "traefik"
  traefik.constraint-label: "traefik"

x-api-deploy: &api-deployment
  mode: replicated
  update_config:
    parallelism: 1
    delay: 5s
    order: start-first
    failure_action: rollback
  rollback_config:
    order: start-first
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 120s

services:
  crafty:
    container_name: crafty_container
    image: registry.gitlab.com/crafty-controller/crafty-4:${CRAFTY_VERSION:-4.10.2}
    environment:
      - TZ=Europe/Berlin
      - HTTP_PROXY=http://minecraft-proxy:3128
      - HTTPS_PROXY=http://minecraft-proxy:3128
      - NO_PROXY=localhost,127.0.0.1
    networks:
      - traefik
      - local
    ports:
      #BEDROCK
      - target: 19132
        published: 19132
        protocol: udp
        mode: host
      #MC SERV PORT RANGE
      - target: 25500
        published: 25500
        protocol: tcp
        mode: host
      - target: 25501
        published: 25501
        protocol: tcp
        mode: host
      - target: 25502
        published: 25502
        protocol: tcp
        mode: host
      - target: 25503
        published: 25503
        protocol: tcp
        mode: host
      - target: 25504
        published: 25504
        protocol: tcp
        mode: host
    volumes:
      - crafty-backups:/crafty/backups
      - crafty-logs:/crafty/logs
      - crafty-servers:/crafty/servers
      - crafty-config:/crafty/app/config
      - crafty-import:/crafty/import
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.labels.minecraft == data
      labels:
        <<: *traefik-labels
        traefik.http.routers.crafty.rule: "Host(`crafty.szabolcsi.dev`)"
        traefik.http.routers.crafty.entrypoints: "https"
        traefik.http.routers.crafty.tls: "true"
        traefik.http.routers.crafty.tls.certresolver: "letsencrypt"
        traefik.http.routers.crafty.middlewares: "local"
        traefik.http.services.crafty.loadbalancer.server.port: "8443"
        traefik.http.services.crafty.loadbalancer.server.scheme: "https"
        traefik.http.services.crafty.loadbalancer.serverstransport: "crafty@http"

  proxy:
    image: haproxy:3.1.7-alpine
    hostname: minecraft-proxy
    networks:
      - local
      - public
    configs:
      - source: haproxy
        target: /usr/local/etc/haproxy/haproxy.cfg
    deploy:
      replicas: 1
      <<: *api-deployment

volumes:
  #normal:
  #  name: minecraft-normal-data
  #  driver: local
  #java:
  #  name: minecraft-normal-java
  #  driver: local
  crafty-backups:
    driver: local
    driver_opts:
      type: nfs
      device: ":/nfs_share/minecraft/crafty/backups"
      o: "addr=10.0.0.3,rw,soft,nfsvers=4"
  crafty-servers:
    driver: local
    driver_opts:
      type: nfs
      device: ":/nfs_share/minecraft/crafty/servers"
      o: "addr=10.0.0.3,rw,soft,nfsvers=4"
  crafty-config:
    driver: local
    driver_opts:
      type: nfs
      device: ":/nfs_share/minecraft/crafty/config"
      o: "addr=10.0.0.3,rw,soft,nfsvers=4"
  crafty-import:
    driver: local
    driver_opts:
      type: nfs
      device: ":/nfs_share/minecraft/crafty/import"
      o: "addr=10.0.0.3,rw,soft,nfsvers=4"
  crafty-logs:
    driver: local
    driver_opts:
      type: nfs
      device: ":/nfs_share/minecraft/crafty/logs"
      o: "addr=10.0.0.3,rw,soft,nfsvers=4"

networks:
  local:
    name: minecraft
    driver: overlay
    internal: false
    ipam:
      config:
        - subnet: 172.30.16.0/24
  traefik:
    external: true
  public:
    name: base-public
    external: true

configs:
  haproxy:
   name: "${HAPROXY_CONFIG_NAME}"
   external: true